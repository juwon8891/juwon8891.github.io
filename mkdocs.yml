site_name: 학습 정리
site_url: https://juwon8891.github.io
repo_url: https://github.com/juwon8891/juwon8891.github.io
edit_uri: edit/main/docs/

theme:
  name: material
  language: ko
  palette:
    # Light mode
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 다크 모드로 전환
    # Dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 라이트 모드로 전환
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

plugins:
  - search:
      lang:
        - ko
        - en
  - tags

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 2

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/juwon8891

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - GPU:
    - GPU 클러스터 용어 사전: gpu/gpu-cluster-glossary.md
    - NVIDIA CUDA 아키텍처: gpu/nvidia-cuda-architecture.md
    - GPU 인터커넥트: gpu/infiniband-nvlink-nvswitch.md
  - EKS:
    - Intro & Deployment: eks/week1-intro-deployment.md
    - Networking: eks/week2-networking.md
    - Scaling: eks/week3-scaling.md
    - AuthN & AuthZ: eks/week4-authn-authz.md
    - Pod Readiness Gates: eks/week5-pod-readiness-gates.md
    - CI/CD: eks/week6-cicd.md
    - Cluster Upgrade: eks/week7-cluster-upgrade.md
  - K8s Deploy:
    - Kubernetes Hard Way: k8s-deploy/week1-kubernetes-hard-way.md
    - Ansible Basics: k8s-deploy/week2-ansible-basics.md
    - Kubeadm Upgrade: k8s-deploy/week3-kubeadm-upgrade.md
    - Kubespray Deployment: k8s-deploy/week4-kubespray-deployment.md
    - Kubespray HA & Upgrade: k8s-deploy/week5-kubespray-ha-upgrade.md
    - Kubespray Offline: k8s-deploy/week6-kubespray-offline.md
    - RKE2 & Cluster API: k8s-deploy/week7-rke2-cluster-api.md
  - CI/CD:
    - Image Build: cicd/week1-image-build.md
    - Helm & Tekton: cicd/week2-helm-tekton.md
    - Jenkins & ArgoCD: cicd/week3-jenkins-argocd.md
    - ArgoCD Advanced: cicd/week4-argocd-advanced.md
    - ArgoCD Security & Keycloak: cicd/week5-argocd-security-keycloak.md
    - ArgoCD Final: cicd/week6-argocd-final.md
    - Vault Secrets: cicd/week7-vault-secrets.md
    - Vault Production: cicd/week8-vault-production.md
