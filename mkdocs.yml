site_name: 학습 정리
site_url: https://juwon8891.github.io
repo_url: https://github.com/juwon8891/juwon8891.github.io
edit_uri: edit/main/docs/

theme:
  name: material
  language: ko
  palette:
    # Light mode
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 다크 모드로 전환
    # Dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 라이트 모드로 전환
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

plugins:
  - search:
      lang:
        - ko
        - en
  - tags

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/juwon8891

nav:
  - Home: index.md
  - CUDA:
    - NVIDIA CUDA 아키텍처: cuda/nvidia-cuda-architecture.md
  - EKS:
    - Week 1 - Intro & Deployment: eks/week1-intro-deployment.md
    - Week 2 - Networking: eks/week2-networking.md
    - Week 3 - Scaling: eks/week3-scaling.md
    - Week 4 - AuthN & AuthZ: eks/week4-authn-authz.md
    - Week 5 - Pod Readiness Gates: eks/week5-pod-readiness-gates.md
    - Week 6 - CI/CD: eks/week6-cicd.md
    - Week 7 - Cluster Upgrade: eks/week7-cluster-upgrade.md
  - K8s Deploy:
    - Week 1 - Kubernetes Hard Way: k8s-deploy/week1-kubernetes-hard-way.md
    - Week 2 - Ansible Basics: k8s-deploy/week2-ansible-basics.md
    - Week 3 - Kubeadm Upgrade: k8s-deploy/week3-kubeadm-upgrade.md
    - Week 4 - Kubespray Deployment: k8s-deploy/week4-kubespray-deployment.md
    - Week 5 - Kubespray HA & Upgrade: k8s-deploy/week5-kubespray-ha-upgrade.md
    - Week 6 - Kubespray Offline: k8s-deploy/week6-kubespray-offline.md
    - Week 7 - RKE2 & Cluster API: k8s-deploy/week7-rke2-cluster-api.md
  - CI/CD:
    - Week 1 - Image Build: cicd/week1-image-build.md
    - Week 2 - Helm & Tekton: cicd/week2-helm-tekton.md
    - Week 3 - Jenkins & ArgoCD: cicd/week3-jenkins-argocd.md
    - Week 4 - ArgoCD Advanced: cicd/week4-argocd-advanced.md
    - Week 5 - ArgoCD Security & Keycloak: cicd/week5-argocd-security-keycloak.md
    - Week 6 - ArgoCD Final: cicd/week6-argocd-final.md
    - Week 7 - Vault Secrets: cicd/week7-vault-secrets.md
    - Week 8 - Vault Production: cicd/week8-vault-production.md
